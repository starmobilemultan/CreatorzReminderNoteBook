name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Root Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Local Module Dependencies
        # Ensures @expo/config-plugins is resolvable from modules/alarm-manager/
        # Required for pnpm strict isolation mode (deps are NOT auto-hoisted)
        run: |
          cd modules/alarm-manager
          npm install --no-package-lock

      - name: Install EAS CLI
        run: pnpm add -g eas-cli

      - name: Verify Expo Login
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Create .eas/project.json
        run: |
          mkdir -p .eas
          cat > .eas/project.json << EOF
          {
            "projectId": "1b684cdd-aab1-4472-8654-c8cfd7cd478c"
          }
          EOF

      - name: Build Android APK (Preview — includes native AlarmManager module)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait
