apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.creatorz.alarmmanager"
    compileSdkVersion 35

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig false
    }
}

dependencies {
    // ─────────────────────────────────────────────────────────────────────────
    // CRITICAL: Do NOT declare expo-modules-core as a Maven dependency.
    // Expo SDK 53 local modules receive expo-modules-core through autolinked
    // module resolution (expo-modules-autolinking) at build time.
    // The host app provides expo-modules-core; we only declare it as compileOnly
    // to satisfy the compiler when building this library.
    // ─────────────────────────────────────────────────────────────────────────
    
    // Provided by expo-modules-autolinking + host app (Expo SDK 53)
    compileOnly 'com.facebook.react:react-android:0.79.+'
    
    // Standard Android/Kotlin libraries — provided at runtime by host app
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
}
