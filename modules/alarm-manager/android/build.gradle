apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.creatorz.alarmmanager"
    compileSdkVersion 35

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // expo-modules-core is provided by the host Expo app at runtime.
    // We use 'api' so that its classes are available to Kotlin at compile time
    // without being re-bundled into the library JAR.
    compileOnly "expo.modules:expo-modules-core:2.3.+"

    // React Native — provided by the host app
    compileOnly 'com.facebook.react:react-android:0.79.+'

    // AndroidX
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
}
