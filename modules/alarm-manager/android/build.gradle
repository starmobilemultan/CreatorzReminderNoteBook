apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.creatorz.alarmmanager"
    compileSdkVersion 35

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig false
    }
}

// DO NOT declare a repositories {} block here.
// Gradle 8+ treats a project-level repositories block as overriding the
// settings.gradle dependencyResolutionManagement block, which loses the
// EAS internal Maven cache and causes "no versions available" errors.
// All repositories are inherited from the root project via settings.gradle.

dependencies {
    // expo-modules-core is provided by the host Expo app — compile-only.
    // Use 2.+ to match any expo-modules-core 2.x release (currently 2.4.0).
    compileOnly "expo.modules:expo-modules-core:2.+"

    // React Native — provided by the host app
    compileOnly 'com.facebook.react:react-android:0.79.+'

    // AndroidX
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
}
